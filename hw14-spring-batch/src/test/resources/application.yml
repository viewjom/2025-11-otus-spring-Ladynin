spring:
  batch:
    job:
      enabled: false
  data:
    mongodb:
      port: 27017
      database: main
      host: localhost
      uri: mongodb://localhost:27017
  datasource:
    url: jdbc:h2:mem:maindb
    sql:
      init:
        mode: always
        schema-locations: schema.sql
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    show-sql: true
  h2:
    console:
      enabled: true
  shell:
    command:
      version:
        enabled: false
    interactive:
      enabled: false
de:
  flapdoodle:
    mongodb:
      embedded:
        version: 4.0.2

mongock:
  runner-type: "InitializingBean"
  change-logs-scan-package:
    - ru.otus.hw.mongock.changelogs
  mongo-db:
    write-concern:
      journal: false
    read-concern: local
  test-enabled: true